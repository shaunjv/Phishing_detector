<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phishing URL Detector</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #1a1a2e;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background-color: #16213e;
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            width: 500px;
        }

        h1 {
            color: #e94560;
            margin-bottom: 10px;
        }

        p {
            color: #a8a8b3;
            margin-bottom: 30px;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            margin-bottom: 15px;
            font-size: 14px;
            background-color: #0f3460;
            color: white;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #e94560;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background-color: #c73652;
        }

        .result {
            margin-top: 25px;
            font-size: 22px;
            font-weight: bold;
            padding: 15px;
            border-radius: 10px;
            background-color: #0f3460;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>🛡️ Phishing Detector</h1>
        <p>Enter a URL below to check if it's safe or phishing</p>
        <form method="POST">
            <input type="text" name="url" placeholder="https://example.com" required />
            <button type="submit">Check URL</button>
        </form>
        {% if result %}
        <div class="result">
            {{ result }}
        </div>
        {% endif %}
    </div>
</body>

</html>
